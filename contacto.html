<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DoctorQR · Contacto">
<meta name="theme-color" content="#12A5FF">
<title>DoctorQR · Contacto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --green: #12A5FF;
    --red: #ff0000;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --text: #e8e8e8;
    --muted: rgba(255,255,255,0.35);
    --border: rgba(18,165,255,0.15);
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    background:var(--bg);
    min-height:100vh;
    min-height:-webkit-fill-available;
    font-family:'Inter',system-ui,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    position:relative;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(18,165,255,0.02) 40px,rgba(18,165,255,0.02) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(18,165,255,0.02) 40px,rgba(18,165,255,0.02) 41px);
    pointer-events:none;
    z-index:0;
  }

  /* ===== HEADER ===== */
  .header {
    width:100%; max-width:480px;
    padding:32px 24px 0;
    display:flex; flex-direction:column; align-items:center;
    position:relative; z-index:1;
  }

  .logo-wrap {
    margin-bottom:-100px;
    perspective:800px;
    filter:drop-shadow(0 0 12px #12A5FF) drop-shadow(0 0 30px rgba(18,165,255,0.4));
  }

  .logo-rotate {
    animation: logo3d 8s ease-in-out infinite;
    transform-style: preserve-3d;
    display: inline-block;
  }

  @keyframes logo3d {
    0%   { transform: rotateY(0deg); }
    25%  { transform: rotateY(180deg); }
    50%  { transform: rotateY(360deg); }
    75%  {
      transform: rotateY(180deg);
      filter: drop-shadow(0 0 18px #ff0000)
              drop-shadow(0 0 35px #ff0000);
    }
    100% { transform: rotateY(360deg); }
  }

  .brand {
    font-family:'Arial Black',Arial,sans-serif;
    font-size:28px; font-weight:900; letter-spacing:10px;
    margin-bottom:4px;
  }
  .txt-doctor { color:#12A5FF; text-shadow:0 0 10px #12A5FF,0 0 25px rgba(18,165,255,0.6); }
  .txt-qr     { color:#ffffff; text-shadow:0 0 10px #ffffff,0 0 20px rgba(255,255,255,0.4); }

  /* ===== CONTENEDOR PRINCIPAL ===== */
  .main {
    width:100%; max-width:480px;
    padding:24px 20px 48px;
    position:relative; z-index:1;
  }

  /* ===== TÍTULOS ===== */
  .page-title {
    font-size:18px; font-weight:900;
    letter-spacing:6px; text-transform:uppercase;
    color:var(--green);
    text-shadow:0 0 12px var(--green);
    text-align:center;
    margin-bottom:4px;
  }

  .page-subtitle {
    font-size:10px; color:var(--muted);
    letter-spacing:2px; text-align:center;
    margin-bottom:32px;
  }

  /* ===== CARD ===== */
  .form-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px 20px;
    margin-bottom:16px;
  }

  .form-card-title {
    font-size:9px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase;
    color:rgba(18,165,255,0.5);
    margin-bottom:20px;
  }

  /* ===== CHIPS TIPO ===== */
  .chips-tipo {
    display:flex; flex-wrap:wrap; gap:8px;
    margin-bottom:4px;
  }

  .chip-tipo {
    padding:8px 14px;
    border:1px solid rgba(18,165,255,0.25);
    border-radius:20px;
    font-size:10px; font-weight:600;
    letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted);
    cursor:pointer;
    transition:all 0.15s;
    background:transparent;
    font-family:inherit;
  }

  .chip-tipo.active {
    border-color:var(--green);
    color:var(--green);
    text-shadow:0 0 8px var(--green);
    box-shadow:0 0 12px rgba(18,165,255,0.15);
    background:rgba(18,165,255,0.05);
  }

  /* ===== INPUTS ===== */
  .field {
    margin-bottom:16px;
  }

  .field-label {
    font-size:9px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
    color:rgba(18,165,255,0.5);
    margin-bottom:8px;
  }

  .field-input,
  .field-textarea {
    width:100%;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 16px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--text);
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance:none;
  }

  .field-input:focus,
  .field-textarea:focus {
    border-color:rgba(18,165,255,0.5);
    box-shadow:0 0 0 3px rgba(18,165,255,0.08);
  }

  .field-input::placeholder,
  .field-textarea::placeholder {
    color:rgba(255,255,255,0.2);
  }

  .field-textarea {
    min-height:130px;
    resize:vertical;
    line-height:1.6;
  }

  .char-count {
    font-size:9px; color:var(--muted);
    text-align:right; margin-top:4px;
    letter-spacing:1px;
  }

  .char-count.ok { color:var(--green); }

  /* ===== CHECKBOX ===== */
  .checkbox-row {
    display:flex; align-items:flex-start;
    gap:12px; margin-bottom:20px;
  }

  .checkbox-row input[type="checkbox"] {
    width:20px; height:20px; flex-shrink:0;
    margin-top:2px;
    accent-color:var(--green);
    cursor:pointer;
  }

  .checkbox-label {
    font-size:11px; color:var(--muted);
    line-height:1.6; cursor:pointer;
  }

  /* ===== BOTÓN PRINCIPAL ===== */
  .btn-primary {
    width:100%; padding:18px;
    background:transparent;
    border:2px solid var(--green);
    border-radius:12px;
    color:var(--green);
    font-family:inherit; font-size:12px;
    font-weight:900; letter-spacing:3px;
    text-transform:uppercase; cursor:pointer;
    text-shadow:0 0 8px var(--green);
    box-shadow:0 0 16px rgba(18,165,255,0.15);
    transition:all 0.2s;
    margin-bottom:12px;
  }

  .btn-primary:disabled {
    opacity:0.3; cursor:not-allowed;
  }

  .btn-primary:not(:disabled):hover {
    background:rgba(18,165,255,0.07);
    box-shadow:0 0 24px rgba(18,165,255,0.25);
  }

  .btn-back {
    width:100%; padding:14px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:12px;
    color:var(--muted);
    font-family:inherit; font-size:11px;
    font-weight:600; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer;
    transition:all 0.2s;
  }

  /* ===== MENSAJES RESULTADO ===== */
  .result-msg {
    display:none;
    border-radius:12px;
    padding:20px;
    text-align:center;
    font-size:13px;
    line-height:1.7;
    margin-bottom:16px;
  }

  .result-msg.success {
    border:1px solid rgba(18,165,255,0.4);
    background:rgba(18,165,255,0.06);
    color:var(--green);
  }

  .result-msg.error {
    border:1px solid rgba(255,0,0,0.4);
    background:rgba(255,0,0,0.06);
    color:#ff4444;
  }
</style>
</head>

<!-- ===== FORMULARIO ===== -->
<div class="main">

  <div class="page-title">CONTACTO</div>
  <div class="page-subtitle">Reclamaciones · Sugerencias · Soporte</div>

  <!-- MENSAJE ÉXITO -->
  <div class="result-msg success" id="msg-success">
    ✓ Mensaje enviado correctamente.<br>
    Te responderemos en un plazo máximo de 48 horas.
    <br><br>
    <button class="btn-back" onclick="window.location.href='index.html'">
      VOLVER AL INICIO
    </button>
  </div>

  <!-- MENSAJE ERROR -->
  <div class="result-msg error" id="msg-error">
    ✕ Error al enviar. Inténtalo de nuevo.
  </div>

  <div class="form-card" id="contact-form-card">
    <div class="form-card-title">Tipo de mensaje</div>

    <div class="chips-tipo" id="chips-tipo">
      <button class="chip-tipo" data-tipo="Reclamación">RECLAMACIÓN</button>
      <button class="chip-tipo" data-tipo="Sugerencia">SUGERENCIA</button>
      <button class="chip-tipo" data-tipo="Error técnico">ERROR TÉCNICO</button>
      <button class="chip-tipo" data-tipo="Pregunta general">PREGUNTA GENERAL</button>
      <button class="chip-tipo" data-tipo="Otro">OTRO</button>
    </div>
  </div>

  <div class="form-card" id="contact-fields-card">
    <div class="form-card-title">Tus datos de contacto</div>

    <div class="field">
      <div class="field-label">Nombre completo *</div>
      <input type="text" class="field-input" id="inp-nombre"
        placeholder="Tu nombre completo" autocomplete="name">
    </div>

    <div class="field">
      <div class="field-label">Email de contacto *</div>
      <input type="email" class="field-input" id="inp-email"
        placeholder="tu@email.com" autocomplete="email">
    </div>

    <div class="field">
      <div class="field-label">Asunto *</div>
      <input type="text" class="field-input" id="inp-asunto"
        placeholder="Describe brevemente el motivo">
    </div>

    <div class="field">
      <div class="field-label">Mensaje *</div>
      <textarea class="field-textarea" id="inp-mensaje"
        placeholder="Describe tu mensaje con el mayor detalle posible (mínimo 20 caracteres)"></textarea>
      <div class="char-count" id="char-count">0 / mín. 20 caracteres</div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="chk-privacidad">
      <label class="checkbox-label" for="chk-privacidad">
        He leído y acepto la política de privacidad de DoctorQR.
        Mis datos serán utilizados exclusivamente para dar respuesta a esta consulta.
      </label>
    </div>

    <button class="btn-primary" id="btn-enviar" disabled>
      ENVIAR MENSAJE
    </button>
  </div>

</div>

<script>
  // ===== CHIPS TIPO =====
  let tipoSeleccionado = '';

  document.querySelectorAll('.chip-tipo').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip-tipo').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      tipoSeleccionado = chip.dataset.tipo;
      checkForm();
    });
  });

  // ===== CONTADOR TEXTAREA =====
  const msgArea = document.getElementById('inp-mensaje');
  const charCount = document.getElementById('char-count');

  msgArea.addEventListener('input', () => {
    const len = msgArea.value.length;
    charCount.textContent = len + ' / mín. 20 caracteres';
    charCount.classList.toggle('ok', len >= 20);
    checkForm();
  });

  // ===== VALIDACIÓN =====
  function checkForm() {
    const nombre   = document.getElementById('inp-nombre').value.trim();
    const email    = document.getElementById('inp-email').value.trim();
    const asunto   = document.getElementById('inp-asunto').value.trim();
    const mensaje  = msgArea.value.trim();
    const privacidad = document.getElementById('chk-privacidad').checked;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

    document.getElementById('btn-enviar').disabled = !(
      tipoSeleccionado &&
      nombre.length > 1 &&
      emailOk &&
      asunto.length > 2 &&
      mensaje.length >= 20 &&
      privacidad
    );
  }

  ['inp-nombre','inp-email','inp-asunto'].forEach(id => {
    document.getElementById(id).addEventListener('input', checkForm);
  });
  document.getElementById('chk-privacidad').addEventListener('change', checkForm);

  // ===== ENVÍO WEB3FORMS =====
  document.getElementById('btn-enviar').addEventListener('click', async () => {
    const btn = document.getElementById('btn-enviar');
    btn.disabled = true;
    btn.textContent = 'ENVIANDO…';

    document.getElementById('msg-success').style.display = 'none';
    document.getElementById('msg-error').style.display = 'none';

    const payload = {
      access_key: '2347aa30-b511-41b6-a5dd-1c8f80c38a6b',
      subject: '[DoctorQR ' + tipoSeleccionado + '] ' +
        document.getElementById('inp-asunto').value.trim(),
      from_name: document.getElementById('inp-nombre').value.trim(),
      email: document.getElementById('inp-email').value.trim(),
      message:
        'TIPO: ' + tipoSeleccionado + '\n\n' +
        document.getElementById('inp-mensaje').value.trim(),
    };

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('contact-form-card').style.display  = 'none';
        document.getElementById('contact-fields-card').style.display = 'none';
        document.getElementById('msg-success').style.display = 'block';
      } else {
        throw new Error(data.message || 'Error desconocido');
      }
    } catch(e) {
      document.getElementById('msg-error').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ENVIAR MENSAJE';
    }
  });
</script>
</body>
</html>
