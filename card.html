  <meta charset="UTF-8">

  <meta name="theme-color" content="#000000">
  <title>Atabeyapp</title>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff41;
      --red: #ff0000;
      --amber: #ffcc00;
      --bg: #ffffff;
      --card-bg: rgba(255,0,0,0.03);
      --card-border: rgba(0,0,0,0.10);
      --text: #000000;
      --dim: rgba(0,0,0,0.55);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; font-size: 18px; min-height: 100vh; padding-bottom: 90px; }

    /* HEADER */
    .header { background: rgba(255,255,255,0.98); border-bottom: 1px solid rgba(0,0,0,0.1); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.1); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .logo { font-size: 11px; font-weight: 900; letter-spacing: 3px; color: #ff0000; text-shadow: 0 0 8px rgba(255,0,0,0.3); }
    .lang-switcher { display: flex; gap: 5px; }
    .lang-btn { background: transparent; border: 1px solid rgba(0,0,0,0.2); color: rgba(0,0,0,0.45); font-family: inherit; font-size: 10px; letter-spacing: 1px; padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .lang-btn.active { border-color: #ff0000; color: #ff0000; text-shadow: 0 0 6px rgba(255,0,0,0.3); }
    .patient-name { font-size: clamp(28px, 7vw, 32px); font-weight: 900; letter-spacing: 2px; color: #000000; line-height: 1.2; margin-bottom: 8px; word-break: break-word; }
    .patient-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .blood-badge { background: var(--red); color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; padding: 8px 20px; border-radius: 8px; box-shadow: 0 0 14px rgba(255,0,0,0.5); }
    .age-badge { font-size: 12px; color: var(--dim); letter-spacing: 1px; }
    .qr-type-badge { font-size: 9px; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.15); color: rgba(0,0,0,0.35); }
    .ts-note { font-size: 9px; color: rgba(0,0,0,0.25); letter-spacing: 1px; margin-top: 4px; }

    /* SEARCH */
    .search-bar { background: rgba(255,255,255,0.98); border-bottom: 1px solid rgba(0,0,0,0.1); padding: 10px 16px; display: flex; align-items: center; gap: 8px; position: sticky; z-index: 99; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .search-input { flex: 1; background: rgba(255,0,0,0.04); border: 1px solid rgba(255,0,0,0.3); color: #ff0000; font-family: inherit; font-size: 14px; letter-spacing: 1px; padding: 7px 12px; border-radius: 6px; outline: none; transition: border-color 0.15s; min-width: 0; }
    .search-input:focus { border-color: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.18); }
    .search-input::placeholder { color: rgba(255,0,0,0.35); }
    .search-counter { font-size: 12px; color: var(--dim); white-space: nowrap; min-width: 62px; text-align: center; }
    .search-nav { display: flex; gap: 4px; }
    .nav-btn { background: transparent; border: 1px solid rgba(255,0,0,0.25); color: #ff0000; font-family: inherit; font-size: 16px; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .nav-btn:hover { background: rgba(255,0,0,0.06); }
    .nav-btn:disabled { opacity: 0.22; cursor: default; }
    mark { background: #ffcc00; color: #000; border-radius: 2px; padding: 0 1px; }
    mark.current { background: #ff6600; color: #fff; }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.98); position: sticky; z-index: 98; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .tab-btn { flex: 1; background: transparent; border: none; border-bottom: 3px solid transparent; color: rgba(0,0,0,0.45); font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 2px; padding: 14px 6px; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { color: #ff0000; border-bottom-color: #ff0000; }

    /* PANELS */
    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    /* SECTIONS */
    .section { margin-bottom: 28px; }
    .section-title { font-size: 16px; font-weight: 900; letter-spacing: 3px; color: #ff0000; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid rgba(255,0,0,0.2); }
    .section-title.red   { color: var(--red);   border-bottom-color: rgba(255,0,0,0.3); }
    .section-title.amber { color: #cc7700;       border-bottom-color: rgba(180,120,0,0.25); }
    .section-title.gray  { color: rgba(0,0,0,0.55); border-bottom-color: rgba(0,0,0,0.12); }

    /* BADGES */
    .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
    .badge { font-size: 13px; letter-spacing: 0.5px; padding: 7px 14px; border-radius: 6px; font-weight: 700; display: inline-block; margin: 2px 2px 2px 0; }
    .b-red   { background: rgba(255,0,0,0.08);   border: 1px solid rgba(255,0,0,0.5);   color: #cc0000; }
    .b-amber { background: rgba(180,120,0,0.08); border: 1px solid rgba(180,120,0,0.4); color: #8a5e00; }
    .b-green { background: rgba(0,120,0,0.07);   border: 1px solid rgba(0,120,0,0.35);  color: #006600; }
    .b-gray  { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.18); color: rgba(0,0,0,0.70); }

    /* DATA ROWS */
    .data-row { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid rgba(0,0,0,0.08); align-items: flex-start; }
    .data-row:last-child { border-bottom: none; }
    .data-label { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--dim); min-width: 130px; padding-top: 1px; flex-shrink: 0; }
    .data-value { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.5; word-break: break-word; }
    .data-value.crit { color: #cc0000; font-weight: 900; }

    /* CONTACTS */
    .contact-card { background: rgba(255,0,0,0.02); border: 1.5px solid rgba(255,0,0,0.15); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
    .contact-name { font-size: 20px; font-weight: 900; color: #000000; margin-bottom: 4px; }
    .contact-rel  { font-size: 13px; font-weight: 600; color: var(--dim); letter-spacing: 1px; margin-bottom: 10px; }
    .tel-link { display: inline-block; font-size: 24px; font-weight: 900; color: #ff0000; text-decoration: none; letter-spacing: 1px; }
    .tel-link:hover { color: #cc0000; }
    .tel-sm { font-size: 18px; }

    /* STATES */
    .empty { color: var(--dim); font-size: 11px; letter-spacing: 1px; text-align: center; padding: 24px 0; }
    .error-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 24px; text-align: center; gap: 16px; }
    .error-icon  { font-size: 56px; color: var(--red); }
    .error-title { font-size: 18px; font-weight: 900; color: #ff0000; letter-spacing: 2px; }
    .error-msg   { font-size: 12px; color: var(--dim); max-width: 280px; line-height: 1.8; }

    /* FOOTER */
    .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.98); border-top: 1px solid var(--card-border); padding: 12px 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
    .btn-profile { display: block; width: 100%; max-width: 420px; background: var(--green); color: #000; font-family: inherit; font-size: 11px; font-weight: 900; letter-spacing: 3px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; text-align: center; text-decoration: none; transition: opacity 0.15s; }
    .btn-profile:hover { opacity: 0.85; }
    .footer-note { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
    .minimal-banner { background: rgba(255,165,0,0.12); border: 1px solid rgba(255,165,0,0.4); border-radius: 8px; padding: 10px 14px; font-size: 10px; letter-spacing: 0.5px; color: #ffaa00; text-align: center; margin: 0 0 12px; line-height: 1.5; }

// ================================================================
// Helpers
// ================================================================
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function arr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  return String(v).split(/[,;]\s*/).map(s => s.trim()).filter(Boolean);
}

function calcAge(ds) {
  if (!ds) return null;
  const d = new Date(ds);
  if (isNaN(d)) return null;
  return Math.floor((Date.now() - d) / (365.25 * 24 * 3600 * 1000));
}

function isCrit(v) {
  if (typeof v !== 'string' || !v) return false;
  const u = v.toUpperCase();
  return u.startsWith('SÍ') || u.startsWith('SI ') || u === 'SI' ||
         u.includes('YES') || u.includes('CONFIRMAD') ||
         u.includes('DIFÍCIL') || u.includes('DIFICIL');
}

// ================================================================
// Render helpers
// ================================================================
function section(title, body, color) {
  if (!body) return '';
  return `<div class="section"><div class="section-title ${color||''}">${title}</div>${body}</div>`;
}

function badges(items, cls) {
  if (!items.length) return '';
  return `<div class="badge-list">${items.map(i => `<span class="badge ${cls}">${esc(i)}</span>`).join('')}</div>`;
}

function row(label, val, crit) {
  if (!val) return '';
  return `<div class="data-row"><span class="data-label">${label}</span><span class="data-value${crit ? ' crit' : ''}">${esc(val)}</span></div>`;
}

function badgeRow(label, items, cls) {
  if (!items.length) return '';
  return `<div class="data-row"><span class="data-label">${label}</span><span class="data-value">${items.map(i => `<span class="badge ${cls}">${esc(i)}</span>`).join('')}</span></div>`;
}

function objRow(label, obj) {
  if (!obj || !Object.keys(obj).length) return '';
  const items = Object.entries(obj).map(([k, v]) => `${k}: ${v}`).join(', ');
  return `<div class="data-row"><span class="data-label">${label}</span><span class="data-value">${esc(items)}</span></div>`;
}

function telRow(label, tel, cls) {
  if (!tel) return '';
  return `<div class="data-row"><span class="data-label">${label}</span><span class="data-value"><a class="tel-link ${cls||''}" href="tel:${esc(tel)}">${esc(tel)}</a></span></div>`;
}

function renderUrgente(d, t, vis) {
  let html = '';

  if (!vis || vis.includes('allergy')) {
    let al = '';
    al += badgeRow(t.l_drug,  arr(d.allergy_med),        'badge b-red');
    al += badgeRow(t.l_anest, arr(d.allergy_anesthesia),  'badge b-red');
    al += badgeRow(t.l_food,  arr(d.allergy_food),        'badge b-amber');
    al += badgeRow(t.l_env,   arr(d.allergy_env),         'badge b-amber');
    al += row(t.l_latex,  d.latex_guantes,      isCrit(d.latex_guantes));
    al += row(t.l_epipen, d.epipen,             false);
    al += row(t.l_glucagon, d.glucagon,         false);
    al += objRow(t.l_allergy_severity, d.allergy_severity);
    al += row(t.l_anaph,  d.anafilaxia_previa,  isCrit(d.anafilaxia_previa));
    al += row(t.l_anaph_trigger, d.anaphylaxis_trigger, true);
    if (al) html += section(t.s_allergy, al, 'red');
  }

  if (!vis || vis.includes('medication')) {
    let med = '';
    med += badgeRow(t.l_meds,     arr(d.meds),                    'badge b-amber');
    med += badgeRow(t.l_highrisk, arr(d.medicacion_alto_riesgo),  'badge b-red');
    med += row(t.l_dose,    d.med_doses,               false);
    med += row(t.l_last,       d.ultima_toma_medicacion, false);
    med += row(t.l_med_adjust, d.med_last_adjust,        false);
    med += row(t.l_anticoa,    d.anticoagulado,    isCrit(d.anticoagulado));
    med += badgeRow(t.l_psiq, arr(d.meds_psiquiatria), 'badge b-amber');
    med += row(t.l_hormonal, d.terapia_hormonal_activa || 'No', false);
    if (d.terapia_hormonal_activa === 'Sí') {
      const _tipos = arr(d.terapia_hormonal_tipos);
      if (d.terapia_hormonal_otra) _tipos.push(d.terapia_hormonal_otra);
      med += badgeRow(t.l_hormonal_tipos, _tipos, 'badge b-amber');
      med += row(t.l_hormonal_dosis, d.terapia_hormonal_dosis_frecuencia, false);
      const _dur = [d.terapia_hormonal_duracion_valor, d.terapia_hormonal_duracion_unidad].filter(Boolean).join(' ');
      if (_dur) med += row(t.l_hormonal_duracion, _dur, false);
    }
    if (med) html += section(t.s_med, med, 'amber');
  }

  if (!vis || vis.includes('supplements')) {
    let sup = '';
    sup += badgeRow(t.l_sup, arr(d.suplementos), 'badge b-gray');
    if (sup) html += section(t.s_sup, sup, 'gray');
  }

  if (!vis || vis.includes('conditions')) {
    let cond = '';
    const conds  = arr(d.conditions);
    const diseas = arr(d.diseases);
    if (conds.length)  cond += badges(conds,  'badge b-red');
    if (diseas.length) cond += (cond ? '<br style="display:block;margin:4px 0">' : '') + badges(diseas, 'badge b-amber');
    cond += row(t.l_adv,    d.advance_directive, false);
    cond += row(t.l_decide, d.can_decide,        false);
    const acvVal = d.acv_previo ? (d.acv_previo + (d.acv_year ? ` (${d.acv_year})` : '')) : '';
    cond += row(t.l_acv,          acvVal,                        isCrit(d.acv_previo));
    cond += row(t.l_vih,          d.vih,                         isCrit(d.vih));
    cond += row(t.l_hepatitis,    d.hepatitis,                   isCrit(d.hepatitis));
    cond += row(t.l_tuberculosis, d.tuberculosis,                isCrit(d.tuberculosis));
    cond += row(t.l_oncol,        d.tratamiento_oncologico,      isCrit(d.tratamiento_oncologico));
    cond += row(t.l_salud_emoc,   d.salud_emocional_dx,          false);
    cond += badgeRow(t.l_diag_psiq, arr(d.salud_emocional_diagnostico), 'badge b-gray');
    cond += row(t.l_decide_salud, d.puede_decidir_salud,         false);
    cond += row(t.l_tutor,        d.tutor_legal,                 false);
    if (cond) html += section(t.s_cond, cond);
  }

  if (!vis || vis.includes('devices')) {
    let dev = '';
    dev += row(t.l_dai,   d.dai,          isCrit(d.dai));
    const stentsVal = d.stents ? (d.stents + (d.stents_year ? ` (${d.stents_year})` : '')) : '';
    dev += row(t.l_stents, stentsVal,     isCrit(d.stents));
    dev += row(t.l_port,  d.puerto_cateter, false);
    dev += row(t.l_pace,      d.pacemaker,                 isCrit(d.pacemaker));
    dev += row(t.l_implant,   d.material_osteosintesis,    false);
    dev += row(t.l_intub,     d.dificultad_intubacion,     isCrit(d.dificultad_intubacion));
    dev += row(t.l_anestcomp, d.complicaciones_anestesia,  false);
    dev += badgeRow(t.l_ayudas, arr(d.ayudas_tecnicas),     'badge b-gray');
    if (dev) html += section(t.s_devices, dev);
  }

  if (!vis || vis.includes('risk_factors')) {
    let rf = '';
    rf += row(t.l_pregnancy, d.embarazo,          isCrit(d.embarazo));
    rf += row(t.l_weeks,     d.embarazo_semanas,  false);
    rf += row(t.l_drugs,     d.drogas,            isCrit(d.drogas));
    rf += row(t.l_alcohol,   d.alcohol,           isCrit(d.alcohol));
    if (rf) html += section(t.s_risk, rf, 'red');
  }

  // Restricciones: siempre visible (lang_spoken + religion son datos always-show)
  {
    let res = '';
    res += badgeRow(t.l_lang,        arr(d.lang_spoken),   'badge b-gray');
    res += badgeRow(t.l_lang_written, arr(d.lang_written), 'badge b-gray');
    res += badgeRow(t.l_comm_diff,   arr(d.comm_difficulty), 'badge b-gray');
    res += badgeRow(t.l_sign_lang,   arr(d.sign_lang),     'badge b-gray');
    res += row(t.l_religion, d.religion_restrictions, false);
    res += row(t.l_donor,    d.organ_donor,           false);
    if (res) html += section(t.s_restrict, res);
  }

  return html || `<div class="empty">${t.nodata}</div>`;
}

function detectLang() {
  const l = (navigator.language || 'es').slice(0, 2).toLowerCase();
  return T[l] ? l : 'es';
}

const BACKEND = 'https://doctorqr-backend-production.up.railway.app';

async function parseData() {
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (id) {
      const t = params.get('t') || '';

      // 1. Cargar desde la nube por doctorqr_id — acceso público de emergencia
      try {
        const res = await fetch(`${BACKEND}/api/profile/load?id=${encodeURIComponent(id)}`);
        if (res.ok) {
          const { profile } = await res.json();
          if (profile) {
            profile._qr_type = t;
            return profile;
          }
        }
      } catch (_) {}

      // 2. Fallback: localStorage en el mismo dispositivo
      const saved = localStorage.getItem('doctorqr_profile');
      if (saved) {
        const d = JSON.parse(saved);
        d._qr_type = t;
        return d;
      }

      // 3. Fallback final: solo parámetros básicos de la URL
      const n = decodeURIComponent(params.get('n') || '');
      const parts = n.trim().split(' ');
      return {
        nombre:        parts[0] || '',
        apellidos:     parts.slice(1).join(' '),
        sangre:        decodeURIComponent(params.get('s') || ''),
        allergy_med:   params.get('a') ? [decodeURIComponent(params.get('a'))] : [],
        ec1_phone_num: decodeURIComponent(params.get('e') || ''),
        _minimal:      true,
        _qr_type:      t
      };
    }

    // Formato legacy: LZString comprimido
    const compressed = params.get('d') || window.location.hash.slice(1);
    if (!compressed) return null;
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    if (!json) return null;
    return JSON.parse(json);
  } catch(e) { return null; }
}

function switchTab(name) {

// ================================================================
// Search
// ================================================================
function initSearch() {
  const inp  = document.getElementById('sinput');
  const prev = document.getElementById('sprev');
  const next = document.getElementById('snext');
  if (!inp) return;

  inp.addEventListener('input', () => runSearch(inp.value));
  prev.addEventListener('click', () => navigate(-1));
  next.addEventListener('click', () => navigate(1));
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
    if (e.key === 'ArrowUp')  { e.preventDefault(); navigate(-1); }
    if (e.key === 'Escape')   { inp.value = ''; runSearch(''); inp.blur(); }
  });
}

function getTextNodes(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = []; let n;
  while ((n = walker.nextNode())) {
    if (n.nodeValue.trim()) nodes.push(n);
  }
  return nodes;
}

function clearMarks() {
  document.querySelectorAll('.tab-panel mark').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });
}

function normalize(str) {
  return str.normalize('NFD').replace(/[̀-ͯ]/g, '');
}

function runSearch(q) {
  clearMarks();
  searchMatches = [];
  searchCurrent = -1;
  updateCounter();
  const prev = document.getElementById('sprev');
  const next = document.getElementById('snext');

  if (!q || q.length < 1) {
    if (prev) prev.disabled = true;
    if (next) next.disabled = true;
    return;
  }

  const ql = normalize(q.toLowerCase());
  document.querySelectorAll('.tab-panel').forEach(panel => {
    getTextNodes(panel).forEach(node => {
      const txt = node.nodeValue;
      const low = normalize(txt.toLowerCase());
      let idx = low.indexOf(ql);
      if (idx === -1) return;
      const frag = document.createDocumentFragment();
      let last = 0;
      while (idx !== -1) {
        if (idx > last) frag.appendChild(document.createTextNode(txt.slice(last, idx)));
        const mk = document.createElement('mark');
        mk.textContent = txt.slice(idx, idx + ql.length);
        frag.appendChild(mk);
        searchMatches.push(mk);
        last = idx + ql.length;
        idx = low.indexOf(ql, last);
      }
      if (last < txt.length) frag.appendChild(document.createTextNode(txt.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });
  });

  if (searchMatches.length) {
    searchCurrent = 0;
    highlight();
    if (prev) prev.disabled = false;
    if (next) next.disabled = false;
  } else {
    if (prev) prev.disabled = true;
    if (next) next.disabled = true;
  }
  updateCounter();
}

function navigate(dir) {
  if (!searchMatches.length) return;
  searchCurrent = (searchCurrent + dir + searchMatches.length) % searchMatches.length;
  highlight();
  const cur = searchMatches[searchCurrent];
  if (cur) cur.scrollIntoView({ behavior: 'instant', block: 'nearest' });
  updateCounter();
}

function highlight() {
  searchMatches.forEach((m, i) => m.classList.toggle('current', i === searchCurrent));
  const cur = searchMatches[searchCurrent];
  if (!cur) return;
  const panel = cur.closest('.tab-panel');
  if (panel) {
    const id = panel.id.replace('panel-', '');
    if (id !== activeTab) switchTab(id);
  }
}

function updateCounter() {
  const el  = document.getElementById('sctr');
  const inp = document.getElementById('sinput');
  if (!el) return;
  if (!searchMatches.length) {
    el.textContent = inp && inp.value.length >= 2 ? t.no_results : '';
    return;
  }
  el.textContent = t.results(searchCurrent + 1, searchMatches.length);
}

// ================================================================
// Language switch
// ================================================================
function setLang(l) {
  if (!T[l]) return;
  const prevQ = document.getElementById('sinput')?.value || '';
  const prevTab = activeTab;
  lang = l;
  t    = T[l];
  document.documentElement.lang = l;
  renderApp();
  if (prevTab !== 'urgente') switchTab(prevTab);
  if (prevQ.length >= 2) {
    const inp = document.getElementById('sinput');
    if (inp) { inp.value = prevQ; runSearch(prevQ); }
  }
}

// ================================================================
// Boot
// ================================================================
lang = detectLang();
t    = T[lang];
parseData().then(d => {
  data = d;
  if (data) renderApp();
  else       renderError();
});
</script>
</body>
</html>
